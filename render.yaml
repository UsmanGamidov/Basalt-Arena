# Render Blueprint — два сервиса:
#   1) basalt-arena-api  — NestJS API (только API + /health, статику НЕ отдаёт)
#   2) basalt-arena-web  — статический SPA на CDN Render (мгновенный, не засыпает)
#
# Применение: Render → New → Blueprint → выбрать репозиторий.
# Секреты (sync: false) задаются в дашборде после создания.
services:
  # ── Backend API ─────────────────────────────────────────────
  - type: web
    name: basalt-arena-api
    runtime: node
    plan: free
    region: frankfurt # ближе к Supabase (eu-west) и RU-пользователям
    buildCommand: npm install && npm run build:api
    startCommand: npm run start:api # миграции применяются при старте, не в билде
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL # Supabase Session Pooler URI
        sync: false
      - key: JWT_SECRET # 32+ символов
        sync: false
      - key: BASALT_DEV_REGISTER_KEY
        sync: false
      - key: BASALT_CORS_ORIGIN # URL фронта, напр. https://basalt-arena-web.onrender.com
        sync: false

  # ── Frontend (static SPA на CDN) ────────────────────────────
  - type: web
    name: basalt-arena-web
    runtime: static
    buildCommand: npm install && npm run build:web
    staticPublishPath: ./client/dist
    envVars:
      - key: VITE_API_BASE_URL # URL API, напр. https://basalt-arena-api.onrender.com
        sync: false
    routes:
      # SPA-fallback: любой путь отдаёт index.html (клиентский роутинг /hall, /profile…)
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
